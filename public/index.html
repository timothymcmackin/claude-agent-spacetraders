<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpaceTraders Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      border-bottom: 1px solid #2d2d4e;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      color: #7c6af7;
      letter-spacing: 0.02em;
    }
    .logo span { color: #e2e8f0; }
    #agent-badge {
      font-size: 0.8rem;
      background: #2d2d4e;
      border: 1px solid #4a4a7a;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      color: #a5b4fc;
      display: none;
    }

    /* ── Setup screen ── */
    #setup-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .setup-card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }
    .setup-card h2 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      color: #c4b5fd;
    }
    .setup-card p {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.35rem;
    }
    .form-group input, .form-group select {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #7c6af7;
    }
    .btn-primary {
      width: 100%;
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn-primary:hover { background: #6b58e6; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Chat screen ── */
    #chat-screen {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    /* Quick actions */
    .quick-actions {
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      border-bottom: 1px solid #2d2d4e;
      background: #12122a;
      flex-shrink: 0;
    }
    .quick-btn {
      background: #1e1e3a;
      border: 1px solid #3a3a5c;
      color: #a5b4fc;
      border-radius: 999px;
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .quick-btn:hover { background: #2a2a4a; border-color: #7c6af7; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .msg.user { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; }

    .msg-bubble {
      max-width: min(680px, 85%);
      padding: 0.65rem 0.9rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: #312e81;
      color: #e0e7ff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: #1e1e3a;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    /* Tool call display */
    .tool-call {
      max-width: min(680px, 85%);
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.8rem;
    }
    .tool-call-header {
      background: #1a1a2e;
      padding: 0.4rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
    }
    .tool-call-header:hover { background: #22223a; }
    .tool-icon { font-size: 0.9rem; }
    .tool-name { color: #7c6af7; font-weight: 600; font-family: monospace; }
    .tool-toggle { margin-left: auto; color: #64748b; font-size: 0.7rem; }
    .tool-call-body {
      background: #0d0d1a;
      padding: 0.6rem 0.75rem;
      display: none;
    }
    .tool-call-body.open { display: block; }
    .tool-call-body pre {
      font-family: monospace;
      font-size: 0.78rem;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #64748b;
      font-size: 0.8rem;
      padding: 0.25rem 0;
    }
    .dots span {
      display: inline-block;
      width: 5px; height: 5px;
      background: #64748b;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Input area */
    .input-area {
      padding: 0.75rem 1rem;
      border-top: 1px solid #2d2d4e;
      background: #12122a;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #prompt-input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      max-height: 140px;
      line-height: 1.5;
      font-family: inherit;
    }
    #prompt-input:focus { border-color: #7c6af7; }
    #prompt-input::placeholder { color: #4a4a6a; }
    #send-btn {
      background: #7c6af7;
      border: none;
      border-radius: 10px;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: white;
    }
    #send-btn:hover { background: #6b58e6; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Space<span>Traders</span> Agent</div>
  <div id="agent-badge"></div>
</header>

<!-- Setup screen shown when no agent is configured -->
<div id="setup-screen">
  <div class="setup-card">
    <h2>Register your agent</h2>
    <p>Create a new SpaceTraders account to get started. Your token will be saved and persist across sessions.</p>
    <div class="form-group">
      <label>Agent callsign (3–14 characters)</label>
      <input id="setup-symbol" type="text" placeholder="e.g. VOIDRUNNER" maxlength="14">
    </div>
    <div class="form-group">
      <label>Starting faction</label>
      <select id="setup-faction">
        <option value="COSMIC">COSMIC</option>
        <option value="VOID">VOID</option>
        <option value="GALACTIC">GALACTIC</option>
        <option value="QUANTUM">QUANTUM</option>
        <option value="DOMINION">DOMINION</option>
        <option value="ASTRO">ASTRO</option>
        <option value="CORSAIRS">CORSAIRS</option>
      </select>
    </div>
    <div class="form-group">
      <label>Email (optional, for account recovery)</label>
      <input id="setup-email" type="email" placeholder="you@example.com">
    </div>
    <button class="btn-primary" id="register-btn">Register Agent</button>
  </div>
</div>

<!-- Chat screen shown when agent is configured -->
<div id="chat-screen">
  <div class="quick-actions">
    <button class="quick-btn" data-prompt="Show my agent status including credits and headquarters.">Agent Status</button>
    <button class="quick-btn" data-prompt="List all my ships and their current status, location, and cargo.">My Ships</button>
    <button class="quick-btn" data-prompt="List all my contracts, including their terms, deadlines, and payment.">Contracts</button>
    <button class="quick-btn" data-prompt="Accept the most profitable contract available.">Accept Best Contract</button>
    <button class="quick-btn" data-prompt="List waypoints in my current system and identify any asteroid fields.">Find Asteroids</button>
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <textarea id="prompt-input" rows="1" placeholder="Give a command or ask a question…"></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
