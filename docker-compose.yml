services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Scripts Claude writes — stored locally so you can browse them when the container is stopped
      - ./workspace:/workspace
      # Persist SpaceTraders account credentials (token, agent info)
      - agent-data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SPACETRADERS_TOKEN=${SPACETRADERS_TOKEN}

volumes:
  agent-data:
