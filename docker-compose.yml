services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persist scripts Claude writes across container restarts
      - agent-workspace:/workspace
      # Persist SpaceTraders account credentials (token, agent info)
      - agent-data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SPACETRADERS_TOKEN=${SPACETRADERS_TOKEN}

volumes:
  agent-data:
  agent-workspace:
